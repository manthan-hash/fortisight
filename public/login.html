<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FortiSight</title>
  <link rel="stylesheet" href="styles-new.css">
</head>
<body class="auth-body">
  <div class="tech-element"></div>
  <div class="tech-element"></div>
  <div class="tech-element"></div>
  <div class="tech-element"></div>
  
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
      </div>
      <h1>FortiSight</h1>
      <p class="auth-subtitle">Smart Real-Time Security Monitor</p>
    </div>

    <form class="auth-form" id="loginForm" action="/api/login" method="post" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="form-input-wrapper">
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="security@fortisight.com" 
            autocomplete="username"
            required
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
          >
          <div class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="form-input-wrapper">
          <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="Enter secure password" 
            autocomplete="current-password"
            required
          >
          <div class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </div>
        </div>
      </div>

      <button type="submit" class="auth-btn primary">
        <span>Log In</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
          <polyline points="10,17 15,12 10,7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
      </button>

      <div class="auth-links">
        <a href="#" class="auth-link">Forgot password?</a>
        <a href="/public/register.html" class="auth-link">Sign up</a>
      </div>

      <div class="error-message" id="errorMessage"></div>
    </form>
  </div>

  <script src="auth.js"></script>
</body>
</html>
