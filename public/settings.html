<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - FortiSight</title>
  <link rel="stylesheet" href="styles-new.css">
</head>
<body class="app-body">
  <!-- Top Navigation Bar -->
  <header class="app-header">
    <div class="header-content">
      <div class="header-brand">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        <span class="brand-name">FortiSight</span>
      </div>
      <nav class="header-nav">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="alerts.html" class="nav-link">Alerts</a>
        <a href="settings.html" class="nav-link active">Settings</a>
        <button class="nav-btn logout" onclick="logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16,17 21,12 16,7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </nav>
    </div>
  </header>

  <!-- Main Settings Content -->
  <main class="app-main">
    <section class="settings-section">
      <h2>System Configuration</h2>
      
      <!-- Detection Settings -->
      <div class="settings-group">
        <h3>Detection Settings</h3>
        
        <div class="setting-item">
          <label for="visionSensitivity">Vision Sensitivity</label>
          <div class="setting-control">
            <input type="range" id="visionSensitivity" min="1" max="10" value="5" class="slider">
            <span class="slider-value" id="visionValue">5</span>
          </div>
        </div>
        
        <div class="setting-item">
          <label for="sensorSensitivity">Sensor Sensitivity</label>
          <div class="setting-control">
            <select id="sensorSensitivity" class="setting-select">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="maximum">Maximum</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Notification Settings -->
      <div class="settings-group">
        <h3>Notification Settings</h3>
        
        <div class="setting-item">
          <label for="notificationThreshold">Risk Threshold</label>
          <div class="setting-control">
            <input type="number" id="notificationThreshold" min="0" max="100" value="50" class="number-input">
            <span class="input-suffix">Send notifications when risk score ≥</span>
          </div>
        </div>
        
        <div class="setting-item">
          <label>Notification Channels</label>
          <div class="toggle-group">
            <div class="toggle-item">
              <label class="toggle-label">
                <input type="checkbox" id="notifyEmail" checked>
                <span class="toggle-slider"></span>
                Email Notifications
              </label>
            </div>
            
            <div class="toggle-item">
              <label class="toggle-label">
                <input type="checkbox" id="notifySMS">
                <span class="toggle-slider"></span>
                SMS Notifications
              </label>
            </div>
            
            <div class="toggle-item">
              <label class="toggle-label">
                <input type="checkbox" id="notifyInApp" checked>
                <span class="toggle-slider"></span>
                In-App Notifications
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Device Management -->
      <div class="settings-group">
        <h3>Device Management</h3>
        
        <div class="devices-list" id="devicesList">
          <!-- Devices will be populated by JavaScript -->
        </div>
      </div>

      <!-- Save Button -->
      <div class="settings-actions">
        <button class="btn primary large" onclick="saveSettings()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17,21 17,13 7,13 7,21"/>
          </svg>
          Save Settings
        </button>
        
        <div class="save-status" id="saveStatus">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <polyline points="20,6 9,17 4,17"/>
            <path d="M20 6v13a2 2 0 01-2 2H6a2 2 0 01-2-2V7a2 2 0 012-2h8l4-4z"/>
          </svg>
          <span id="saveMessage">Settings saved</span>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
