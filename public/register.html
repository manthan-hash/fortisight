<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - FortiSight</title>
  <link rel="stylesheet" href="styles-new.css">
</head>
<body class="auth-body">
  <div class="tech-element"></div>
  <div class="tech-element"></div>
  <div class="tech-element"></div>
  <div class="tech-element"></div>
  
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
      </div>
      <h1>FortiSight</h1>
      <p class="auth-subtitle">Create your account to get started</p>
    </div>

    <form class="auth-form" id="signupForm" action="/api/register" method="post" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="form-input-wrapper">
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="security@fortisight.com" 
            autocomplete="email"
            required
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
          >
          <div class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="form-input-wrapper">
          <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="Enter secure password" 
            autocomplete="new-password"
            required
          >
          <div class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="form-input-wrapper">
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword"
            placeholder="Confirm your password" 
            autocomplete="new-password"
            required
          >
          <div class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </div>
        </div>
      </div>

      <button type="submit" class="auth-btn primary">
        <span>Sign Up</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="8.5" cy="7" r="4"/>
          <path d="M20 8v6M23 11h-6"/>
        </svg>
      </button>

      <div class="auth-links">
        <span>Already have an account? <a href="login.html" class="auth-link">Sign in</a></span>
      </div>

      <div class="error-message" id="errorMessage"></div>
    </form>
  </div>

  <script src="auth.js"></script>
</body>
</html>
